[build]
builder = "DOCKERFILE"
dockerfilePath = "./Dockerfile"

[deploy]
numReplicas = 1
startCommand = "python main.py"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ALWAYS"

[service]
port = 8000

[variables]
ENVIRONMENT = "production"
API_PORT = "8000"
LOG_LEVEL = "INFO"
